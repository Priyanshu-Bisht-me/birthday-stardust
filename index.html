<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(270deg, #ff6b6b, #feca57, #a29bfe, #fd79a8);
            background-size: 600% 600%;
            animation: bgmove 10s ease infinite;
            overflow: hidden;
        }
        @keyframes bgmove{
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .card
        {
            background: rgba(255,255,255,0.93);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba (0,0,0,0.2);
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        .card p {
            color:#888;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        input {
            width: 100px;
            padding: 11px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            text-align: center;
            outline: none;
            font-family: Georgia, 'Times New Roman', Times, serif;
            transition: border-color 0.3s, box shadow 0.3s;
            margin-bottom: 22px;
        }
        input:focus{
            border-color: #e84393;
            box-shadow: 0 0 0 3px rgba(232, 67, 147, 0.15);
        }

        h1 {
            font-size: 2.3rem;
            color: #e84393;
            text-shadow: 1px 2px 6px rgba(0,0,0,0.1);
            animation: bounce 0.9s ease infinite alternate;
            margin-bottom: 6px;
        }
        @keyframes bounce{
            from {transform: translate(0px);}
            to {transform: translate(-14px);}
        }
        .sub {
            color: #ff6b6b;
            font-size: 1rem;
            margin-bottom: 18px;
        }
        img{
            width: 140px;
            border-radius: 12px;
            display: block;
            margin: 0 auto 18px;
            animation: wobble 2s ease-in-out infinite alternate;
        }
        @keyframes wobble{
            from {transform: rotate(-4deg) scale(1);}
            to {transform: rotate(4deg) scale(1.06);}
        }
        .msg {
            font-size: 0.95rem;
            color:#555;
            line-height: 1.6;
            padding: 14px 18px;
            background: #fff5f9;
            border-radius: 12px;
            border-left: 4px solid #e84393;
        }
        .balloon {
            position: fixed;
            font-size: 44px;
            pointer-events: none;
            animation: rise linear infinite;
        }
        .b1{
            left:4%; animation-duration: 4s; animation-delay: 0s;
        }
         .b2{
            left:20%; animation-duration: 5.2s; animation-delay: 1.1s;
        }
         .b3{
            left:76%; animation-duration: 3.7s; animation-delay: 0.5s;
        }
         .b4{
            left:89%; animation-duration: 4.6s; animation-delay: 1.8s;
        }
        @keyframes rise{
            0% {bottom: -80px; opacity: 1;}
            100% {bottom: 110px; opacity: 0;}
        }
        .star
        {
            position: fixed;
            pointer-events: none;
            animation: twinkle 1.5s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(0.8);}
            to { opacity: 1; transform: scale(1.3) rotate(15deg);}
        }
    </style>
</head>

<body>
    <span class="balloon b1">🎈</span>
    <span class="balloon b2">🎈</span>
    <span class="balloon b3">🎈</span>
    <span class="balloon b4">🎈</span>

    <span class="star" style="top: 9%; left: 8%; font-size: 24px; animation-delay: 0.3s;" >⭐</span>
    <span class="star" style="top: 14%; right: 9%; font-size: 20px; animation-delay: 0.6s;">✨</span>
    <span class="star" style="bottom: 20%; right: 9%; font-size: 22px; animation-delay: 1s;">⭐</span>
    <span class="star" style="bottom: 14%; right: 7%; font-size: 26px; animation-delay: 0.4s;">✨</span>

    <div class="card">
        <p>🎉 Enter the birthday person's name:</p>
        <input type="text" placeholder="Type name here....">
        <h1>Happy Birthday!</h1>
        <div class="sub">Wishing you the best day ever 🎊 </div>
        <img src="cake.png.png" alt="Birthday Cake">
        <div class="msg">
             🎂 May your day be filled with joy, laughter, love,
      and all the cake you can eat! 🎈
        </div>
        </div>
    
<body>

</html>
